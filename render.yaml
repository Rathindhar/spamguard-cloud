# ============================================================
#  render.yaml — Render.com deployment configuration
# ============================================================
services:
  - type: web
    name: spamguard-cloud
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn cloud_app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
    healthCheckPath: /health
